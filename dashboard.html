<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nARK Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #888;
      --red: #e11d2e;
      --red-dim: #b91c2c;
      --red-glow: rgba(225, 29, 46, 0.15);
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 28px 24px 48px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .logo span { color: var(--red); }
    .logo-sub { font-size: .75rem; color: var(--muted); margin-top: 6px; letter-spacing: .08em; text-transform: uppercase; }
    .datetime { text-align: right; }
    .date-main { font-size: 1.1rem; font-weight: 600; }
    .date-sub { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color .2s;
    }
    .stat:hover { border-color: var(--red-dim); }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .stat-value.red { color: var(--red); }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .section-title::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--red);
      margin-right: 10px;
      vertical-align: middle;
      border-radius: 2px;
    }

    /* ── Shortcuts ── */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all .2s;
      cursor: pointer;
    }
    .shortcut:hover {
      border-color: var(--red);
      background: var(--surface-2);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--red-glow);
    }
    .shortcut-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--red-glow);
      border: 1px solid rgba(225,29,46,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 800;
      color: var(--red);
    }
    .shortcut-name { font-weight: 700; font-size: .95rem; }
    .shortcut-desc { font-size: .72rem; color: var(--muted); line-height: 1.4; }

    /* ── Kanban ── */
    .kanban {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }
    .column.drag-over { border-color: var(--red); background: var(--red-glow); }
    .column-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .column-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .column-count {
      font-size: .7rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      color: var(--muted);
    }
    .column-body {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    .column-body.empty::after {
      content: "案件をドラッグ＆ドロップ";
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: .72rem;
      padding: 24px 8px;
      opacity: .5;
    }

    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      transition: border-color .15s, box-shadow .15s;
      user-select: none;
    }
    .card:active { cursor: grabbing; }
    .card:hover { border-color: #444; }
    .card.dragging { opacity: .4; }
    .card-name { font-weight: 600; font-size: .88rem; margin-bottom: 4px; }
    .card-meta { font-size: .72rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .card-tag {
      display: inline-block;
      font-size: .65rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--red-glow);
      color: var(--red);
      border: 1px solid rgba(225,29,46,.25);
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity .15s;
    }
    .card:hover .card-actions { opacity: 1; }

    /* ── Tasks ── */
    .tasks-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .task-input-row {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .task-list { padding: 8px 0; max-height: 360px; overflow-y: auto; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .15s;
    }
    .task-item:hover { background: var(--surface-2); }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
    .task-check {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text { flex: 1; font-size: .88rem; }
    .task-date { font-size: .72rem; color: var(--muted); }
    .task-date.today { color: var(--red); font-weight: 600; }
    .task-empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: .82rem;
    }

    /* ── Buttons & Inputs ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .btn:hover { border-color: #555; }
    .btn-primary {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: var(--red-dim); border-color: var(--red-dim); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; padding: 4px 8px; font-size: .72rem; }
    .btn-ghost:hover { color: var(--red); background: var(--red-glow); border-color: transparent; }
    .btn-danger:hover { color: var(--red); }

    input[type="text"], input[type="date"], select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 12px;
      font-size: .85rem;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--red); }
    input[type="text"] { flex: 1; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal h3 { font-size: 1rem; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .form-group input, .form-group select { width: 100%; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Layout grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: .82rem;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; }
      .kanban { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .app { padding: 16px; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .datetime { text-align: left; }
      .shortcuts { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">n<span>ARK</span></div>
        <div class="logo-sub">Business Dashboard</div>
      </div>
      <div class="datetime">
        <div class="date-main" id="dateMain"></div>
        <div class="date-sub" id="dateSub"></div>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <section class="section">
      <div class="section-header">
        <div class="section-title">フォルダ</div>
      </div>
      <div class="shortcuts" id="shortcuts"></div>
    </section>

    <div class="main-grid">
      <section class="section">
        <div class="section-header">
          <div class="section-title">案件管理</div>
          <button class="btn btn-primary" onclick="openProjectModal()">+ 案件追加</button>
        </div>
        <div class="kanban" id="kanban"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <div class="section-title">今日のタスク</div>
          <button class="btn btn-ghost" onclick="showAllTasks()">すべて表示</button>
        </div>
        <div class="tasks-panel">
          <div class="task-input-row">
            <input type="text" id="taskInput" placeholder="タスクを入力…" onkeydown="if(event.key==='Enter')addTask()">
            <button class="btn btn-primary" onclick="addTask()">追加</button>
          </div>
          <div class="task-list" id="taskList"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <h3 id="modalTitle">案件を追加</h3>
      <div class="form-group">
        <label>案件名</label>
        <input type="text" id="projectName" placeholder="例: 2026-06_○○クリニック_web">
      </div>
      <div class="form-group">
        <label>クライアント</label>
        <input type="text" id="projectClient" placeholder="例: 正文堂">
      </div>
      <div class="form-group">
        <label>種別</label>
        <select id="projectType">
          <option value="web">web</option>
          <option value="video">video</option>
          <option value="both">both</option>
          <option value="meo">MEO</option>
          <option value="ads">広告</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="projectStatus">
          <option value="todo">未着手</option>
          <option value="doing">進行中</option>
          <option value="done">完了</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeProjectModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveProject()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BASE = 'file:///Users/ogata/Desktop/nARK';

    const FOLDERS = [
      { id: 'clients',   name: 'clients',   desc: '契約書・ブリーフ・連絡記録', icon: 'CL' },
      { id: 'projects',  name: 'projects',  desc: '進行中・完了プロジェクト',   icon: 'PJ' },
      { id: 'finance',   name: 'finance',   desc: '請求書・見積・経費・確定申告', icon: 'FN' },
      { id: 'templates', name: 'templates', desc: '請求書・見積・提案テンプレ',   icon: 'TP' },
      { id: 'marketing', name: 'marketing', desc: '営業リスト・提案・キャンペーン', icon: 'MK' },
      { id: 'sns',       name: 'sns',       desc: 'Instagram・YouTube 管理',    icon: 'SN' },
      { id: 'ops',       name: 'ops',       desc: '料金表・ワークフロー・運営',   icon: 'OP' },
    ];

    const STATUSES = [
      { id: 'todo',  label: '未着手' },
      { id: 'doing', label: '進行中' },
      { id: 'done',  label: '完了' },
    ];

    const STORAGE_KEY = 'nark_dashboard_v1';

    let state = loadState();
    let editingProjectId = null;
    let showAllTasksMode = false;
    let draggedId = null;

    function defaultState() {
      return {
        projects: [
          { id: uid(), name: 'チップオデッセイ上映会記録動画', client: '正文堂', type: 'video', status: 'done', created: '2026-05-09' },
        ],
        tasks: [],
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDateJP(iso) {
      const [y, m, d] = iso.split('-');
      const days = ['日','月','火','水','木','金','土'];
      const dt = new Date(+y, +m-1, +d);
      return `${y}年${+m}月${+d}日（${days[dt.getDay()]}）`;
    }

    /* ── Render ── */
    function render() {
      renderDateTime();
      renderStats();
      renderShortcuts();
      renderKanban();
      renderTasks();
    }

    function renderDateTime() {
      const now = new Date();
      const days = ['日','月','火','水','木','金','土'];
      document.getElementById('dateMain').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
      document.getElementById('dateSub').textContent =
        now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function renderStats() {
      const todo  = state.projects.filter(p => p.status === 'todo').length;
      const doing = state.projects.filter(p => p.status === 'doing').length;
      const done  = state.projects.filter(p => p.status === 'done').length;
      const today = todayStr();
      const todayTasks = state.tasks.filter(t => !t.done && t.date === today).length;

      document.getElementById('stats').innerHTML = [
        { label: '未着手', value: todo, red: false },
        { label: '進行中', value: doing, red: true },
        { label: '完了', value: done, red: false },
        { label: '今日のタスク', value: todayTasks, red: true },
      ].map(s => `
        <div class="stat">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value${s.red ? ' red' : ''}">${s.value}</div>
        </div>
      `).join('');
    }

    function renderShortcuts() {
      document.getElementById('shortcuts').innerHTML = FOLDERS.map(f => `
        <a class="shortcut" href="${BASE}/${f.id}/" title="${BASE}/${f.id}/">
          <div class="shortcut-icon">${f.icon}</div>
          <div class="shortcut-name">${f.name}</div>
          <div class="shortcut-desc">${f.desc}</div>
        </a>
      `).join('');
    }

    function renderKanban() {
      document.getElementById('kanban').innerHTML = STATUSES.map(s => {
        const cards = state.projects.filter(p => p.status === s.id);
        return `
          <div class="column" data-status="${s.id}"
               ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${s.id}')">
            <div class="column-header">
              <span class="column-title">${s.label}</span>
              <span class="column-count">${cards.length}</span>
            </div>
            <div class="column-body${cards.length === 0 ? ' empty' : ''}">
              ${cards.map(p => renderCard(p)).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderCard(p) {
      return `
        <div class="card" draggable="true" data-id="${p.id}"
             ondragstart="onDragStart(event,'${p.id}')" ondragend="onDragEnd(event)">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-meta">
            ${p.client ? `<span>${esc(p.client)}</span>` : ''}
            <span class="card-tag">${esc(p.type)}</span>
            ${p.created ? `<span>${p.created}</span>` : ''}
          </div>
          <div class="card-actions">
            <button class="btn btn-ghost" onclick="editProject('${p.id}')">編集</button>
            <button class="btn btn-ghost btn-danger" onclick="deleteProject('${p.id}')">削除</button>
          </div>
        </div>
      `;
    }

    function renderTasks() {
      const today = todayStr();
      let tasks = state.tasks.slice();

      if (!showAllTasksMode) {
        tasks = tasks.filter(t => t.date === today || (!t.date && !t.done));
      } else {
        tasks = tasks.filter(t => !t.done);
      }

      tasks.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        if (a.date && b.date) return a.date.localeCompare(b.date);
        return 0;
      });

      const el = document.getElementById('taskList');
      if (tasks.length === 0) {
        el.innerHTML = `<div class="task-empty">${showAllTasksMode ? '未完了のタスクはありません' : '今日のタスクはありません'}</div>`;
        return;
      }

      el.innerHTML = tasks.map(t => `
        <div class="task-item${t.done ? ' done' : ''}">
          <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')">
          <span class="task-text">${esc(t.text)}</span>
          ${t.date ? `<span class="task-date${t.date === today ? ' today' : ''}">${t.date === today ? '今日' : t.date}</span>` : ''}
          <button class="btn btn-ghost btn-danger" onclick="deleteTask('${t.id}')">×</button>
        </div>
      `).join('');
    }

    /* ── Projects ── */
    function openProjectModal(id) {
      editingProjectId = id || null;
      document.getElementById('modalTitle').textContent = id ? '案件を編集' : '案件を追加';
      if (id) {
        const p = state.projects.find(x => x.id === id);
        document.getElementById('projectName').value = p.name;
        document.getElementById('projectClient').value = p.client || '';
        document.getElementById('projectType').value = p.type;
        document.getElementById('projectStatus').value = p.status;
      } else {
        document.getElementById('projectName').value = '';
        document.getElementById('projectClient').value = '';
        document.getElementById('projectType').value = 'web';
        document.getElementById('projectStatus').value = 'todo';
      }
      document.getElementById('projectModal').classList.add('open');
      setTimeout(() => document.getElementById('projectName').focus(), 50);
    }

    function closeProjectModal() {
      document.getElementById('projectModal').classList.remove('open');
      editingProjectId = null;
    }

    function saveProject() {
      const name = document.getElementById('projectName').value.trim();
      if (!name) { toast('案件名を入力してください'); return; }
      const data = {
        name,
        client: document.getElementById('projectClient').value.trim(),
        type: document.getElementById('projectType').value,
        status: document.getElementById('projectStatus').value,
      };
      if (editingProjectId) {
        const p = state.projects.find(x => x.id === editingProjectId);
        Object.assign(p, data);
        toast('案件を更新しました');
      } else {
        state.projects.push({ id: uid(), ...data, created: todayStr() });
        toast('案件を追加しました');
      }
      closeProjectModal();
      saveState();
    }

    function editProject(id) { openProjectModal(id); }

    function deleteProject(id) {
      if (!confirm('この案件を削除しますか？')) return;
      state.projects = state.projects.filter(p => p.id !== id);
      saveState();
      toast('案件を削除しました');
    }

    /* ── Drag & Drop ── */
    function onDragStart(e, id) {
      draggedId = id;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedId = null;
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    }
    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    function onDrop(e, status) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!draggedId) return;
      const p = state.projects.find(x => x.id === draggedId);
      if (p && p.status !== status) {
        p.status = status;
        saveState();
        const label = STATUSES.find(s => s.id === status).label;
        toast(`「${p.name}」→ ${label}`);
      }
    }

    /* ── Tasks ── */
    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      state.tasks.unshift({ id: uid(), text, date: todayStr(), done: false });
      input.value = '';
      saveState();
      toast('タスクを追加しました');
    }

    function toggleTask(id) {
      const t = state.tasks.find(x => x.id === id);
      if (t) { t.done = !t.done; saveState(); }
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveState();
    }

    function showAllTasks() {
      showAllTasksMode = !showAllTasksMode;
      renderTasks();
    }

    /* ── Utils ── */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    /* ── Init ── */
    document.getElementById('projectModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeProjectModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeProjectModal();
    });

    render();
    setInterval(renderDateTime, 30000);
  </script>
</body>
</html>
