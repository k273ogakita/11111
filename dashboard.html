<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>nARK Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3ede4;
      --surface: #faf7f2;
      --surface-2: #efe9df;
      --border: #ddd5c8;
      --text: #3a3530;
      --muted: #8c8278;
      --red: #e8956a;
      --red-dim: #d47a4a;
      --red-glow: rgba(232, 149, 106, 0.22);
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(58,53,48,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(58,53,48,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 28px 24px 48px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .logo span { color: var(--red); }
    .logo-sub { font-size: .75rem; color: var(--muted); margin-top: 6px; letter-spacing: .08em; text-transform: uppercase; }
    .datetime { text-align: right; }
    .date-main { font-size: 1.1rem; font-weight: 600; }
    .date-sub { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color .2s;
    }
    .stat:hover { border-color: var(--red-dim); }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
    .stat-value.red { color: var(--red); }
    .stat-tasks { display: flex; flex-direction: column; }
    .stat-task-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .stat-task-row input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      font-size: .78rem;
    }
    .stat-task-btn {
      padding: 6px 10px;
      font-size: .72rem;
      flex-shrink: 0;
    }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .section-title::before {
      content: "";
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--red);
      margin-right: 10px;
      vertical-align: middle;
      border-radius: 2px;
    }

    /* ── Shortcuts ── */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--text);
      transition: all .2s;
      cursor: pointer;
    }
    .shortcut:hover {
      border-color: var(--red);
      background: var(--surface-2);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--red-glow);
    }
    .shortcut-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--red-glow);
      border: 1px solid rgba(232,149,106,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 800; color: var(--red);
    }
    .shortcut-name { font-weight: 700; font-size: .9rem; }
    .shortcut-desc { font-size: .68rem; color: var(--muted); line-height: 1.4; }

    /* ── Kanban ── */
    .kanban {
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr 0.55fr;
      gap: 12px;
      align-items: start;
    }
    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }
    .column.col-done { min-height: 100px; }
    .column.col-done .column-body { max-height: 400px; }
    .column.col-done .card { padding: 8px 10px; }
    .column.col-done .card-name { font-size: .78rem; margin-bottom: 2px; }
    .column.col-done .phase-btns,
    .column.col-done .card-hint,
    .column.col-done .card-actions { display: none; }
    .column.drag-over { border-color: var(--red); background: var(--red-glow); }
    .column-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .column-title { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .column-count {
      font-size: .7rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      color: var(--muted);
    }
    .column-body {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    .column-body.empty::after {
      content: "案件をドラッグ＆ドロップ";
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: .72rem;
      padding: 24px 8px;
      opacity: .5;
    }

    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      user-select: none;
    }
    .card:hover { border-color: #c9bfb0; box-shadow: 0 2px 12px rgba(58,53,48,.08); }
    .card[draggable="true"]:active { cursor: grabbing; }
    .card.dragging { opacity: .4; }
    .card-name { font-weight: 600; font-size: .88rem; margin-bottom: 4px; }
    .card-meta { font-size: .72rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .card-tag {
      display: inline-block;
      font-size: .65rem;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--red-glow);
      color: var(--red);
      border: 1px solid rgba(232,149,106,.3);
    }
    .card-tag.sns {
      background: rgba(58,53,48,.05);
      color: var(--muted);
      border-color: var(--border);
    }
    .card.sns-card { border-left: 2px solid var(--red); }
    .card-link {
      font-size: .7rem;
      color: var(--red);
      background: none;
      border: none;
      padding: 0;
      margin-top: 6px;
      display: inline-block;
      cursor: pointer;
      font-family: var(--font);
    }
    .card-link:hover { text-decoration: underline; }
    .card-hint { font-size: .65rem; color: var(--muted); margin-top: 4px; }

    .phase-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 10px;
    }
    .phase-btn {
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: .65rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all .12s;
      line-height: 1.3;
    }
    .phase-btn:hover { border-color: #c9bfb0; color: var(--text); }
    .phase-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .phase-btn.advance {
      width: auto;
      padding: 5px 10px;
      font-size: .72rem;
      background: var(--red-glow);
      border-color: rgba(232,149,106,.45);
      color: var(--red-dim);
    }
    .phase-btn.advance:hover {
      background: var(--red);
      color: #fff;
    }
    .phase-current {
      font-size: .68rem;
      color: var(--red);
      margin-top: 6px;
      font-weight: 600;
    }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 6px;
    }
    .filter-tab {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }
    .filter-tab:hover { border-color: #c9bfb0; color: var(--text); }
    .filter-tab.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .section-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity .15s;
    }
    .card:hover .card-actions { opacity: 1; }

    /* ── Tasks ── */
    .tasks-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .task-input-row {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }
    .task-list { padding: 8px 0; max-height: 360px; overflow-y: auto; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(58,53,48,.06);
      transition: background .15s;
    }
    .task-item:hover { background: var(--surface-2); }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
    .task-check {
      width: 18px;
      height: 18px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-text { flex: 1; font-size: .88rem; }
    .task-date { font-size: .72rem; color: var(--muted); }
    .task-date.today { color: var(--red); font-weight: 600; }
    .task-empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: .82rem;
    }

    /* ── Buttons & Inputs ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font);
      white-space: nowrap;
    }
    .btn:hover { border-color: #c9bfb0; }
    .btn-primary {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: var(--red-dim); border-color: var(--red-dim); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; padding: 4px 8px; font-size: .72rem; }
    .btn-ghost:hover { color: var(--red); background: var(--red-glow); border-color: transparent; }
    .btn-danger:hover { color: var(--red); }

    input[type="text"], input[type="date"], select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 12px;
      font-size: .85rem;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--red); }
    input[type="text"] { flex: 1; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(58,53,48,.15);
    }
    .modal h3 { font-size: 1rem; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .form-group input, .form-group select { width: 100%; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Layout grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: .82rem;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Path modal ── */
    .path-hint { font-size: .82rem; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
    .path-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .78rem;
      font-family: ui-monospace, monospace;
      word-break: break-all;
      color: var(--text);
      margin-bottom: 14px;
    }
    .path-steps { font-size: .82rem; color: var(--muted); padding-left: 1.2em; line-height: 1.9; }
    .path-steps kbd {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: .75rem;
      color: var(--text);
    }
    .path-note {
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--red-glow);
      border: 1px solid rgba(232,149,106,.25);
      border-radius: 8px;
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; }
      .kanban { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .app { padding: 16px; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .datetime { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">n<span>ARK</span></div>
        <div class="logo-sub">Business Dashboard · v5</div>
      </div>
      <div class="datetime">
        <div class="date-main" id="dateMain"></div>
        <div class="date-sub" id="dateSub"></div>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="main-grid">
      <section class="section">
        <div class="section-header">
          <div class="section-title">案件管理</div>
          <div class="section-actions">
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">すべて</button>
              <button class="filter-tab" data-filter="client" onclick="setFilter('client')">クライアント</button>
              <button class="filter-tab" data-filter="sns" onclick="setFilter('sns')">SNS</button>
            </div>
            <button class="btn btn-primary" onclick="openProjectModal()">+ 追加</button>
          </div>
        </div>
        <div class="kanban" id="kanban"></div>

        <div class="section-header" style="margin-top:28px">
          <div class="section-title">フォルダ</div>
        </div>
        <div class="shortcuts" id="shortcuts"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <div class="section-title">今日のタスク</div>
          <button class="btn btn-ghost" onclick="showAllTasks()">すべて表示</button>
        </div>
        <div class="tasks-panel">
          <div class="task-list" id="taskList"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <h3 id="modalTitle">プロジェクトを追加</h3>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="projectCategory" onchange="onCategoryChange()">
          <option value="client">クライアント案件</option>
          <option value="sns">SNS投稿</option>
        </select>
      </div>
      <div class="form-group">
        <label id="projectNameLabel">案件名</label>
        <input type="text" id="projectName" placeholder="例: 2026-06_○○クリニック_web">
      </div>
      <div class="form-group" id="clientGroup">
        <label>クライアント</label>
        <input type="text" id="projectClient" placeholder="例: 正文堂">
      </div>
      <div class="form-group" id="platformGroup" style="display:none">
        <label>プラットフォーム</label>
        <select id="projectPlatform">
          <option value="instagram">Instagram</option>
          <option value="youtube">YouTube</option>
        </select>
      </div>
      <div class="form-group">
        <label id="projectTypeLabel">種別</label>
        <select id="projectType">
          <option value="web">web</option>
          <option value="video">video</option>
          <option value="both">both</option>
          <option value="meo">MEO</option>
          <option value="ads">広告</option>
          <option value="doc">資料作成</option>
          <option value="biz">事業設計</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="projectStatus">
          <option value="todo">未着手</option>
          <option value="doing">進行中</option>
          <option value="billing">請求中</option>
          <option value="done">完了</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeProjectModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveProject()">保存</button>
      </div>
    </div>
  </div>

  <!-- Path Modal（フォルダ・ファイルを開く） -->
  <div class="modal-overlay" id="pathModal">
    <div class="modal">
      <h3 id="pathModalTitle">フォルダを開く</h3>
      <p class="path-hint">ブラウザのセキュリティ制限で、ローカルフォルダは直接開けません。<br>下のパスをコピーして Finder から開いてください。</p>
      <div class="path-box" id="pathDisplay"></div>
      <ol class="path-steps">
        <li>Finder を開く</li>
        <li><kbd>⌘</kbd> + <kbd>Shift</kbd> + <kbd>G</kbd> を押す</li>
        <li>パスを貼り付けて Enter</li>
      </ol>
      <div class="path-note" id="pathNote" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closePathModal()">閉じる</button>
        <button class="btn btn-primary" onclick="copyPath()">パスをコピー</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ROOT = '/Users/ogata/Desktop/nARK';

    const FOLDERS = [
      { id: 'clients',   name: 'clients',   desc: '契約書・ブリーフ・連絡記録', icon: 'CL' },
      { id: 'projects',  name: 'projects',  desc: '進行中・完了プロジェクト',   icon: 'PJ' },
      { id: 'finance',   name: 'finance',   desc: '請求書・見積・経費・確定申告', icon: 'FN' },
      { id: 'templates', name: 'templates', desc: '請求書・見積・提案テンプレ',   icon: 'TP' },
      { id: 'marketing', name: 'marketing', desc: '営業リスト・提案・キャンペーン', icon: 'MK' },
      { id: 'sns',       name: 'sns',       desc: 'Instagram・YouTube 管理',    icon: 'SN' },
      { id: 'ops',       name: 'ops',       desc: '料金表・ワークフロー・運営',   icon: 'OP' },
    ];

    const STATUSES = [
      { id: 'todo',    label: '未着手',  colClass: '' },
      { id: 'doing',   label: '進行中',  colClass: '' },
      { id: 'billing', label: '請求中',  colClass: '' },
      { id: 'done',    label: '完了',    colClass: 'col-done' },
    ];

    const DOING_PHASES = ['ヒアリング・構成', '撮影', '編集', '制作中', 'チェック中', '納品済'];
    const BILLING_PHASES = ['請求書作成済', '送付済', '入金済'];

    const CLIENT_TYPES = [
      { value: 'web', label: 'web' },
      { value: 'video', label: 'video' },
      { value: 'both', label: 'both' },
      { value: 'meo', label: 'MEO' },
      { value: 'ads', label: '広告' },
      { value: 'doc', label: '資料作成' },
      { value: 'biz', label: '事業設計' },
      { value: 'other', label: 'その他' },
    ];

    const STORAGE_KEY = 'nark_dashboard_v3';

    const SNS_STATUS_MAP = {
      draft: 'todo', scheduled: 'doing', designing: 'doing',
      '翻訳確認中': 'doing', '修正中': 'doing', published: 'done',
    };

    const SNS_DEFAULTS = [
      { name: '夏目漱石舊居', platform: 'instagram', snsStatus: 'draft', status: 'todo', created: '2026-06-09', folder: 'sns/instagram/posts/2026-06-09_夏目漱石舊居/2026-06-09_夏目漱石舊居.md' },
      { name: '押戸石之丘', platform: 'instagram', snsStatus: 'draft', status: 'todo', created: '2026-06-09', folder: 'sns/instagram/posts/2026-06-09_押戸石之丘/2026-06-09_押戸石之丘.md' },
      { name: '六月繡球花', platform: 'instagram', snsStatus: 'draft', status: 'todo', created: '2026-05-29', folder: 'sns/instagram/posts/2026-05-29_六月繡球花/2026-05-29_六月繡球花.md' },
      { name: '日語教室資訊', platform: 'instagram', snsStatus: 'draft', status: 'todo', created: '2026-05-25', folder: 'sns/instagram/posts/2026-05-25_日語教室資訊/2026-05-25_日語教室資訊.md' },
      { name: '潮井自然公園', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-05-23', folder: 'sns/instagram/posts/2026-05-23_潮井自然公園/2026-05-23_潮井自然公園.md' },
      { name: '日本酒賞味期限', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-05-23', folder: 'sns/instagram/posts/2026-05-23_日本酒賞味期限/2026-05-23_日本酒賞味期限.md' },
      { name: '夏目漱石来熊130周年', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-05-01', folder: 'sns/instagram/posts/2026-5-夏目漱石来熊130周年記念イベント続々開催/2026-5-夏目漱石来熊130周年記念イベント続々開催.md' },
      { name: '熊本港', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-05-01', folder: 'sns/instagram/posts/2026-5-熊本港/2026-5-熊本港.md' },
      { name: '日本の漢方と中医の違い', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-05-01', folder: 'sns/instagram/posts/2026-5-日本の漢方と中医の違い/2026-5-日本の漢方と中医の違い.md' },
      { name: 'GO!GO! Rally in 熊本 2026', platform: 'instagram', snsStatus: 'published', status: 'done', created: '2026-04-01', folder: 'sns/instagram/posts/2026-4-GO!GO! Rally in 熊本 2026/2026-4-GO!GO! Rally in 熊本 2026.md' },
    ];

    let state = loadState();
    let editingProjectId = null;
    let showAllTasksMode = false;
    let draggedId = null;
    let justDragged = false;
    let projectFilter = 'all';
    let currentPath = '';

    function defaultState() {
      return {
        projects: [
          { id: uid(), category: 'client', name: 'チップオデッセイ上映会記録動画', client: '正文堂', type: 'video', status: 'done', phase: '', created: '2026-05-09' },
          ...SNS_DEFAULTS.map(s => ({ id: uid(), category: 'sns', type: 'sns', ...s })),
        ],
        tasks: [],
      };
    }

    function migrateState(data) {
      data.projects.forEach(p => {
        if (!p.category) p.category = p.type === 'sns' ? 'sns' : 'client';
        if (p.phase === undefined) p.phase = '';
        if (p.status === 'done' && p.category === 'client' && !p.phase) p.phase = '';
      });
      const existing = new Set(data.projects.map(p => p.folder || p.name));
      SNS_DEFAULTS.forEach(s => {
        if (!existing.has(s.folder) && !existing.has(s.name)) {
          data.projects.push({ id: uid(), category: 'sns', type: 'sns', ...s });
        }
      });
      return data;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return migrateState(JSON.parse(raw));
        for (const key of ['nark_dashboard_v2', 'nark_dashboard_v1']) {
          const old = localStorage.getItem(key);
          if (old) return migrateState(JSON.parse(old));
        }
      } catch (_) {}
      return defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDateJP(iso) {
      const [y, m, d] = iso.split('-');
      const days = ['日','月','火','水','木','金','土'];
      const dt = new Date(+y, +m-1, +d);
      return `${y}年${+m}月${+d}日（${days[dt.getDay()]}）`;
    }

    /* ── Render ── */
    function render() {
      renderDateTime();
      renderStats();
      renderKanban();
      renderShortcuts();
      renderTasks();
    }

    function renderDateTime() {
      const now = new Date();
      const days = ['日','月','火','水','木','金','土'];
      document.getElementById('dateMain').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
      document.getElementById('dateSub').textContent =
        now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function filteredProjects() {
      if (projectFilter === 'all') return state.projects;
      return state.projects.filter(p => p.category === projectFilter);
    }

    function setFilter(f) {
      projectFilter = f;
      document.querySelectorAll('.filter-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.filter === f);
      });
      renderKanban();
      renderStats();
    }

    function renderStats() {
      const projects = filteredProjects();
      const todo    = projects.filter(p => p.status === 'todo').length;
      const doing   = projects.filter(p => p.status === 'doing').length;
      const billing = projects.filter(p => p.status === 'billing').length;
      const done    = projects.filter(p => p.status === 'done').length;
      const today = todayStr();
      const todayTasks = state.tasks.filter(t => !t.done && t.date === today).length;

      const savedInput = document.getElementById('taskInputTop')?.value || '';
      const wasFocused = document.activeElement?.id === 'taskInputTop';

      const filterLabel = projectFilter === 'all' ? '' : projectFilter === 'sns' ? '（SNS）' : '（クライアント）';
      const cards = [
        { label: `未着手${filterLabel}`, value: todo, red: false },
        { label: `進行中${filterLabel}`, value: doing, red: true },
        { label: `請求中${filterLabel}`, value: billing, red: false },
        { label: `完了${filterLabel}`, value: done, red: false },
      ].map(s => `
        <div class="stat">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value${s.red ? ' red' : ''}">${s.value}</div>
        </div>
      `).join('');

      document.getElementById('stats').innerHTML = cards + `
        <div class="stat stat-tasks">
          <div class="stat-label">今日のタスク</div>
          <div class="stat-value red">${todayTasks}</div>
          <div class="stat-task-row">
            <input type="text" id="taskInputTop" placeholder="タスクを追加…" value="${attr(savedInput)}"
                   onkeydown="if(event.key==='Enter')addTask()">
            <button class="btn btn-primary stat-task-btn" type="button" onclick="addTask()">追加</button>
          </div>
        </div>`;

      if (wasFocused) {
        const el = document.getElementById('taskInputTop');
        el.focus();
        el.setSelectionRange(el.value.length, el.value.length);
      }
    }

    function renderShortcuts() {
      document.getElementById('shortcuts').innerHTML = FOLDERS.map(f => `
        <div class="shortcut" role="button" tabindex="0"
             onclick="openFolder('${f.id}', '${f.name}')"
             onkeydown="if(event.key==='Enter'||event.key===' ')openFolder('${f.id}','${f.name}')">
          <div class="shortcut-icon">${f.icon}</div>
          <div class="shortcut-name">${f.name}</div>
          <div class="shortcut-desc">${f.desc}</div>
        </div>
      `).join('');
    }

    const FOLDER_NOTES = {
      projects: '案件ファイル（契約書・素材など）を置くフォルダです。ダッシュボード上の案件データはブラウザに保存されています。',
    };

    function openFolder(folderId, folderName) {
      showPathModal(`${ROOT}/${folderId}`, `${folderName} フォルダ`, FOLDER_NOTES[folderId] || '');
    }

    function openPath(relativePath, label) {
      showPathModal(`${ROOT}/${relativePath}`, label || 'ファイル');
    }

    function showPathModal(path, title, note) {
      currentPath = path;
      document.getElementById('pathModalTitle').textContent = title;
      document.getElementById('pathDisplay').textContent = path;
      const noteEl = document.getElementById('pathNote');
      if (note) {
        noteEl.textContent = note;
        noteEl.style.display = '';
      } else {
        noteEl.style.display = 'none';
      }
      document.getElementById('pathModal').classList.add('open');
    }

    function closePathModal() {
      document.getElementById('pathModal').classList.remove('open');
      currentPath = '';
    }

    function copyPath() {
      if (!currentPath) return;
      navigator.clipboard.writeText(currentPath).then(() => {
        toast('パスをコピーしました。Finderで ⌘+Shift+G → 貼り付け');
      }).catch(() => {
        const el = document.getElementById('pathDisplay');
        const range = document.createRange();
        range.selectNodeContents(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        toast('コピーできませんでした。パスを手動で選択してください');
      });
    }

    function renderKanban() {
      const projects = filteredProjects();
      document.getElementById('kanban').innerHTML = STATUSES.map(s => {
        const cards = projects.filter(p => p.status === s.id);
        const emptyMsg = s.id === 'done' ? '' : 'empty';
        return `
          <div class="column ${s.colClass}" data-status="${s.id}"
               ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${s.id}')">
            <div class="column-header">
              <span class="column-title">${s.label}</span>
              <span class="column-count">${cards.length}</span>
            </div>
            <div class="column-body${cards.length === 0 && emptyMsg ? ' empty' : ''}">
              ${cards.map(p => renderCard(p)).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPhaseButtons(p) {
      if (p.status === 'todo') {
        return `<div class="phase-btns">
          <button class="phase-btn advance" onclick="event.stopPropagation();moveToDoing('${p.id}')">進行中へ →</button>
        </div>`;
      }
      if (p.status === 'doing') {
        const phases = p.category === 'sns'
          ? ['制作中', 'チェック中', '納品済']
          : DOING_PHASES;
        return `<div class="phase-btns">${phases.map(ph => `
          <button class="phase-btn${p.phase === ph ? ' active' : ''}"
                  onclick="event.stopPropagation();setDoingPhase('${p.id}','${ph}')">${ph}</button>
        `).join('')}</div>`;
      }
      if (p.status === 'billing') {
        return `<div class="phase-btns">${BILLING_PHASES.map(ph => `
          <button class="phase-btn${p.phase === ph ? ' active' : ''}"
                  onclick="event.stopPropagation();setBillingPhase('${p.id}','${ph}')">${ph}</button>
        `).join('')}</div>`;
      }
      return '';
    }

    function typeLabel(type) {
      const t = CLIENT_TYPES.find(x => x.value === type);
      return t ? t.label : type;
    }

    function renderCard(p) {
      const isSns = p.category === 'sns';
      const meta = isSns
        ? `<span class="card-tag sns">${esc(p.platform || 'instagram')}</span>
           <span class="card-tag">${esc(typeLabel(p.type))}</span>
           ${p.created ? `<span>${p.created}</span>` : ''}`
        : `${p.client ? `<span>${esc(p.client)}</span>` : ''}
           <span class="card-tag">${esc(typeLabel(p.type))}</span>
           ${p.created ? `<span>${p.created}</span>` : ''}`;
      const link = p.folder
        ? `<button class="card-link" data-path="${attr(p.folder)}" onclick="event.stopPropagation();openPath(this.dataset.path)">ファイルを開く →</button>` : '';
      const phaseLabel = p.phase && p.status !== 'done'
        ? `<div class="phase-current">▸ ${esc(p.phase)}</div>` : '';
      return `
        <div class="card${isSns ? ' sns-card' : ''}" draggable="true" data-id="${p.id}"
             onclick="onCardClick(event,'${p.id}')"
             ondragstart="onDragStart(event,'${p.id}')" ondragend="onDragEnd(event)">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-meta">${meta}</div>
          ${phaseLabel}
          ${renderPhaseButtons(p)}
          ${link}
          ${p.status !== 'done' ? '<div class="card-hint">クリックで編集</div>' : ''}
          <div class="card-actions">
            <button class="btn btn-ghost" onclick="event.stopPropagation();editProject('${p.id}')">編集</button>
            <button class="btn btn-ghost btn-danger" onclick="event.stopPropagation();deleteProject('${p.id}')">削除</button>
          </div>
        </div>
      `;
    }

    function moveToDoing(id) {
      const p = state.projects.find(x => x.id === id);
      if (!p) return;
      p.status = 'doing';
      p.phase = p.category === 'sns' ? '制作中' : 'ヒアリング・構成';
      if (p.category === 'sns') p.snsStatus = 'scheduled';
      saveState();
      toast(`「${p.name}」→ 進行中`);
    }

    function setDoingPhase(id, phase) {
      const p = state.projects.find(x => x.id === id);
      if (!p) return;
      p.phase = phase;
      if (phase === '納品済') {
        p.status = 'billing';
        p.phase = '請求書作成済';
        saveState();
        toast(`「${p.name}」→ 請求中`);
        return;
      }
      if (p.category === 'sns') p.snsStatus = 'scheduled';
      saveState();
      toast(`「${p.name}」→ ${phase}`);
    }

    function setBillingPhase(id, phase) {
      const p = state.projects.find(x => x.id === id);
      if (!p) return;
      p.phase = phase;
      if (phase === '入金済') {
        p.status = 'done';
        p.phase = '';
        if (p.category === 'sns') p.snsStatus = 'published';
        saveState();
        toast(`「${p.name}」→ 完了`);
        return;
      }
      saveState();
      toast(`「${p.name}」→ ${phase}`);
    }

    function onCardClick(e, id) {
      if (justDragged) return;
      if (e.target.closest('.card-actions') || e.target.closest('.card-link') || e.target.closest('.phase-btn')) return;
      editProject(id);
    }

    function renderTasks() {
      const today = todayStr();
      let tasks = state.tasks.slice();

      if (!showAllTasksMode) {
        tasks = tasks.filter(t => t.date === today || (!t.date && !t.done));
      } else {
        tasks = tasks.filter(t => !t.done);
      }

      tasks.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        if (a.date && b.date) return a.date.localeCompare(b.date);
        return 0;
      });

      const el = document.getElementById('taskList');
      if (tasks.length === 0) {
        el.innerHTML = `<div class="task-empty">${showAllTasksMode ? '未完了のタスクはありません' : '今日のタスクはありません'}</div>`;
        return;
      }

      el.innerHTML = tasks.map(t => `
        <div class="task-item${t.done ? ' done' : ''}">
          <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')">
          <span class="task-text">${esc(t.text)}</span>
          ${t.date ? `<span class="task-date${t.date === today ? ' today' : ''}">${t.date === today ? '今日' : t.date}</span>` : ''}
          <button class="btn btn-ghost btn-danger" onclick="deleteTask('${t.id}')">×</button>
        </div>
      `).join('');
    }

    /* ── Projects ── */
    function onCategoryChange() {
      const cat = document.getElementById('projectCategory').value;
      const isSns = cat === 'sns';
      document.getElementById('clientGroup').style.display = isSns ? 'none' : '';
      document.getElementById('platformGroup').style.display = isSns ? '' : 'none';
      document.getElementById('projectNameLabel').textContent = isSns ? '投稿タイトル' : '案件名';
      document.getElementById('projectName').placeholder = isSns
        ? '例: 2026-06-09_夏目漱石舊居' : '例: 2026-06_○○クリニック_web';
      document.getElementById('projectTypeLabel').textContent = isSns ? '投稿形式' : '種別';
      const typeSel = document.getElementById('projectType');
      if (isSns) {
        typeSel.innerHTML = `
          <option value="feed">フィード</option>
          <option value="reel">リール</option>
          <option value="story">ストーリーズ</option>
          <option value="video">動画</option>
          <option value="short">ショート</option>`;
      } else {
        typeSel.innerHTML = CLIENT_TYPES.map(t =>
          `<option value="${t.value}">${t.label}</option>`
        ).join('');
      }
    }

    function openProjectModal(id) {
      editingProjectId = id || null;
      if (id) {
        const p = state.projects.find(x => x.id === id);
        document.getElementById('modalTitle').textContent = p.category === 'sns' ? 'SNS投稿を編集' : '案件を編集';
        document.getElementById('projectCategory').value = p.category || 'client';
        onCategoryChange();
        document.getElementById('projectName').value = p.name;
        document.getElementById('projectClient').value = p.client || '';
        if (p.category === 'sns') {
          document.getElementById('projectPlatform').value = p.platform || 'instagram';
          document.getElementById('projectType').value = p.type === 'sns' ? 'feed' : (p.type || 'feed');
        } else {
          document.getElementById('projectType').value = p.type;
        }
        document.getElementById('projectStatus').value = p.status;
      } else {
        const defaultCat = projectFilter === 'sns' ? 'sns' : 'client';
        document.getElementById('modalTitle').textContent = defaultCat === 'sns' ? 'SNS投稿を追加' : '案件を追加';
        document.getElementById('projectCategory').value = defaultCat;
        onCategoryChange();
        document.getElementById('projectName').value = '';
        document.getElementById('projectClient').value = '';
        document.getElementById('projectPlatform').value = 'instagram';
        document.getElementById('projectType').value = defaultCat === 'sns' ? 'feed' : 'web';
        document.getElementById('projectStatus').value = 'todo';
      }
      document.getElementById('projectModal').classList.add('open');
      setTimeout(() => document.getElementById('projectName').focus(), 50);
    }

    function closeProjectModal() {
      document.getElementById('projectModal').classList.remove('open');
      editingProjectId = null;
    }

    function statusToSnsStatus(status) {
      return { todo: 'draft', doing: 'scheduled', billing: 'scheduled', done: 'published' }[status] || 'draft';
    }

    function saveProject() {
      const name = document.getElementById('projectName').value.trim();
      if (!name) { toast('名前を入力してください'); return; }
      const category = document.getElementById('projectCategory').value;
      const status = document.getElementById('projectStatus').value;
      const data = {
        category,
        name,
        type: document.getElementById('projectType').value,
        status,
      };
      if (category === 'sns') {
        data.platform = document.getElementById('projectPlatform').value;
        data.snsStatus = statusToSnsStatus(status);
        data.client = '';
      } else {
        data.client = document.getElementById('projectClient').value.trim();
        data.platform = '';
        data.snsStatus = '';
        data.folder = '';
      }
      if (editingProjectId) {
        const p = state.projects.find(x => x.id === editingProjectId);
        const prevStatus = p.status;
        Object.assign(p, data);
        if (prevStatus !== data.status) {
          if (data.status === 'doing' && !p.phase) p.phase = 'ヒアリング・構成';
          if (data.status === 'billing' && !p.phase) p.phase = '請求書作成済';
          if (data.status === 'done') p.phase = '';
          if (data.status === 'todo') p.phase = '';
        }
        toast(category === 'sns' ? 'SNS投稿を更新しました' : '案件を更新しました');
      } else {
        const phase = data.status === 'doing' ? 'ヒアリング・構成'
          : data.status === 'billing' ? '請求書作成済' : '';
        state.projects.push({ id: uid(), ...data, phase, created: todayStr() });
        toast(category === 'sns' ? 'SNS投稿を追加しました' : '案件を追加しました');
      }
      closeProjectModal();
      saveState();
    }

    function editProject(id) { openProjectModal(id); }

    function deleteProject(id) {
      if (!confirm('この案件を削除しますか？')) return;
      state.projects = state.projects.filter(p => p.id !== id);
      saveState();
      toast('案件を削除しました');
    }

    /* ── Drag & Drop ── */
    function onDragStart(e, id) {
      draggedId = id;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedId = null;
      justDragged = true;
      setTimeout(() => { justDragged = false; }, 200);
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    }
    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    function onDrop(e, status) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!draggedId) return;
      const p = state.projects.find(x => x.id === draggedId);
      if (p && p.status !== status) {
        p.status = status;
        if (status === 'doing' && !p.phase) p.phase = p.category === 'sns' ? '制作中' : 'ヒアリング・構成';
        if (status === 'billing' && !p.phase) p.phase = '請求書作成済';
        if (status === 'done' || status === 'todo') p.phase = '';
        if (p.category === 'sns') p.snsStatus = statusToSnsStatus(status);
        saveState();
        const label = STATUSES.find(s => s.id === status).label;
        toast(`「${p.name}」→ ${label}`);
      }
    }

    /* ── Tasks ── */
    function addTask() {
      const input = document.getElementById('taskInputTop');
      const text = input.value.trim();
      if (!text) return;
      state.tasks.unshift({ id: uid(), text, date: todayStr(), done: false });
      input.value = '';
      saveState();
      toast('タスクを追加しました');
      input.focus();
    }

    function toggleTask(id) {
      const t = state.tasks.find(x => x.id === id);
      if (t) { t.done = !t.done; saveState(); }
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveState();
    }

    function showAllTasks() {
      showAllTasksMode = !showAllTasksMode;
      renderTasks();
    }

    /* ── Utils ── */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function attr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    /* ── Init ── */
    document.getElementById('projectModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeProjectModal();
    });
    document.getElementById('pathModal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closePathModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeProjectModal(); closePathModal(); }
    });

    render();
    setInterval(renderDateTime, 30000);
  </script>
</body>
</html>
